name: build-runner-image
# Build + publish the custom ARC runner image. Runs on the org's OWN runners (self-hosted ARC, dind) —
# never GitHub-hosted (org runs its own compute by design). Registry layer cache on ghcr keeps rebuilds
# fast (type=gha hangs on these runners).
on:
  push:
    branches: [main]
    paths:
      - runner-image/**
      - .github/workflows/build.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/nixiesoftware/runner

jobs:
  build:
    runs-on: ci   # self-hosted ARC (dind). Do NOT use GitHub-hosted runners.
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: runner-image
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
